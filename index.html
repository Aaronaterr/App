<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
    <div class="container">
        <h1>The Molly Retention Programme</h1>
        <p class="version">Version 1.0 - Built together with my best bud</p>

        <!-- Menu -->
        <div class="menu">
            <button onclick="showSection('days')">Days</button>
            <button onclick="showSection('love')">Reasons I haven't left yet</button>
            <button onclick="showSection('memory')">Memory</button>
            <button onclick="showSection('photo')">Photos</button>
            <button onclick="showSection('letters')">Letters</button>
        </div>

        <!-- Days -->
        <div id="daysSection" class="section">
            <p class="days-line"> You've been putting up with me for </p>
                <div class="days-row">
                    <p id="daysNumber" class="days-number"></p>
                    <p class="days-label">days</p>
                </div>
            <p id="daysText" class="days-text"></p>
        </div>

        <!-- Music -->
        <div class="music-container">
            <audio id="musicPlayer"> 
                <source src="music/ocean eyes.mp3" type="audio/mpeg"> 
            </audio>
                <button onclick="playMusic()" class="music-button">
                🎵👀
                </button>
        </div>

        <!-- Love -->
        <div id="loveSection" class="section" style="display:none;">
            <button onclick="showLove()">Show Message</button>
            <p id="love"></p>
        </div>

        <!-- Memory -->
        <div id="memorySection" class="section" style="display:none;">
            <button onclick="showMemory()">Pick Memory</button>
            <p id="memory"></p>
        </div>

        <!-- Photos -->
        <div id="photoSection" class="section" style="display:none;">
            <button onclick="showPhoto()">Show Photo</button>
            <br><br>
            <img id="photo" src="" width="300" style="display:none; border-radius: 12px;">
        </div>

        <!-- Letters -->
        <div id="lettersSection" class="section" style="display:none;">
            <h2>Open When...</h2>

            <button onclick="openLetter('sad')">Open when you're sad</button>
            <button onclick="openLetter('miss')">Open when you miss me</button>
            <button onclick="openLetter('sleep')">Open when you can't sleep</button>

            <p id="letterText" style="margin-top:20px;"></p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
